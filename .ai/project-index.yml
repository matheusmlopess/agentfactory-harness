  - path: specs/docs/approvedPlans/2026-04-26-wave-0-scaffold.md
    purpose: Approved plan for Wave 0
    wave: 0
    status: implemented

config:
  - path: package.json
    purpose: npm metadata, scripts, dependencies
    key_values:
      bin: "factory: ./dist/index.js"
      scripts: [dev, build, test]
      dependencies: ["@anthropic-ai/sdk", commander, node-pty, zod]
      devDependencies: [typescript, tsup, tsx, "@types/node", vitest]

  - path: tsconfig.json
    purpose: TypeScript compiler config
    key_values:
      strict: true
      noUncheckedIndexedAccess: true
      exactOptionalPropertyTypes: true
      module: NodeNext

  - path: .gitignore
    purpose: Git ignore patterns
    key_values:
      ignores: ["node_modules/", "dist/", ".env"]

maintenance:
  new_file: Add entry in the same commit, same PR
  rename_or_delete: Update path in the same commit
  wave_closes: "Flip status planned → implemented; bump meta.wave"
  version_bump: minor per wave, patch per single-file addition
