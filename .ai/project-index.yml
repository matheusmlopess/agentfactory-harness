meta:
  version: "1.0.0"
  wave: 0
  description: >
    Agent navigation aid — read this before searching src/ or .ai/.
    Updated each wave: add entries for new files, flip status to
    "implemented" on merge. Top-level keys are section names.
  status_values: [implemented, planned, stub]

tui_renderer:
  - path: src/tui/renderer/ansi.ts
    purpose: Raw ANSI escape sequence builders — no dependencies
    exports:
      - ESC
      - CSI
      - enterAltScreen
      - exitAltScreen
      - clearScreen
      - hideCursor
      - showCursor
      - enableMouse
      - disableMouse
      - "moveTo(row, col)"
      - "sgr(...codes)"
      - reset
      - "fg256(n)"
      - "bg256(n)"
      - "fgRgb(r, g, b)"
      - "bgRgb(r, g, b)"
      - bold
      - dim
      - underline
      - reverse
      - clearLine
      - clearToEol
    wave: 0
    status: implemented

  - path: src/tui/renderer/cell-buffer.ts
    purpose: "Core renderer: Cell[][] grid, minimal-diff output, full repaint"
    exports:
      - Cell (interface)
      - CellBuffer (class)
      - "write(row, col, text, style)"
      - "fill(row, col, h, w, char, style)"
      - "diff(prev: CellBuffer): string"
      - "flush(): string"
      - "clone(): CellBuffer"
    wave: 0
    status: implemented

  - path: src/tui/renderer/layout.ts
    purpose: Computes Rect panel regions from terminal dimensions; draws borders
    exports:
      - Rect (interface)
      - PanelLayout (interface)
      - "computeLayout(rows, cols): PanelLayout"
      - "drawBorder(buf, rect, title, focused)"
    wave: 0
    status: implemented

  - path: src/tui/renderer/theme.ts
    purpose: 256-color palette constants + box-drawing char sets
    exports:
      - Colors
      - Box
      - DBox
      - Wire
      - Status
    wave: 0
    status: implemented

tui_input:
  - path: src/tui/input/keyboard.ts
    purpose: Raw stdin buffer to KeyEvent; drops mouse escape bytes
    exports:
      - KeyEvent (interface)
      - "parseKey(data: Buffer): KeyEvent | null"
    wave: 0
    status: implemented

  - path: src/tui/input/mouse.ts
    purpose: "xterm SGR mouse event parser (\\033[<Pb;Px;PyM/m)"
    exports:
      - MouseEvent (interface)
      - "parseMouse(data: Buffer): MouseEvent | null"
    wave: 2
    status: planned

  - path: src/tui/input/router.ts
    purpose: Dispatches keyboard/mouse events to the currently focused panel
    exports:
      - InputRouter (class)
      - "dispatch(event, panels, focused)"
    wave: 2
    status: planned

tui_panels:
  - path: src/tui/panels/Panel.ts
    purpose: Abstract base class for all panels
    exports:
      - Panel (abstract class)
      - "rect: Rect"
      - "focused: boolean"
      - "abstract render(buf: CellBuffer)"
      - "onKey(e: KeyEvent)"
      - "onMouse(e: MouseEvent)"
      - "get inner(): Rect"
    wave: 0
    status: stub

  - path: src/tui/panels/StatusBar.ts
    purpose: Bottom status line — version, mode label, keybind hints
    exports:
      - "renderStatusBar(buf: CellBuffer, rect: Rect, mode?: string): void"
    wave: 0
    status: implemented

  - path: src/tui/panels/SessionPanel.ts
    purpose: Chat panel — streaming Claude output, user input bar
    exports:
      - SessionPanel (class extends Panel)
    wave: 1
    status: planned

  - path: src/tui/panels/OrchestrationCanvas.ts
    purpose: ITUI drag-drop canvas — block layout, wire draw, mouse interactions
